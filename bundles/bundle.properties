sector.mo-01n-01-abandonedBase.name = Abandoned Base
sector.mo-01n-01-abandonedBase.description =  Hello, this is the planet Cilistis. A virus has been discovered on this planet that has destroyed almost all the fauna, so take over the planet and destroy the virus at any cost.

sector.mo-01n-02-sharpCrystals.name = Sharp Crystal
sector.mo-01n-02-sharpCrystals.description = There is a new resource here, crystal, we already know that it is there, but for you it is new, so good luck to you in getting the new resource, and we also discovered new flying enemies.

sector.mo-01n-03-contaminatedLands.name = Infected Lands
sector.mo-01n-03-contaminatedLands.description = An enemy base has been spotted here, destroy their brain and they won't be able to survive without it.

sector.mo-01n-04-erekirPortal.name = Erekir Portal
sector.mo-01n-04-erekirPortal.description = This base was a research base, it was built to study the local flora, and a portal to Erekir was created here, but something went wrong and a virus escaped from Erekir.






