sector.mo-01n-04-erekirPortal.name = Портал эрекира
sector.mo-01n-04-erekirPortal.description = Эта база была исследовательской, она была построена для изучения местной флоры, и здесь был создан портал в Эрекир, но что-то пошло не так, и вирус вырвался из Эрекира.


